name: Backend Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: backend/Stockfolio.Api.Tests

      - name: Test
        run: dotnet test --no-restore --logger "trx;LogFileName=results.trx"
        working-directory: backend/Stockfolio.Api.Tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/Stockfolio.Api.Tests/TestResults/results.trx
